name = "liudiantong-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

# 以下 vars 中的域名全部改为你自己的
[vars]
JWT_SECRET = "请生成一个随机字符串"  # 后面会说怎么生成
DOMAIN_WHITELIST = ["liudiantong.cc"]
DEFAULT_DOMAIN = "liudiantong.cc"

# 以下资源需要先创建，再将生成的 ID 填入
[[kv_namespaces]]
binding = "KV"
id = "待创建后填入"

[[d1_databases]]
binding = "D1"
database_name = "cloud_mail_db"
database_id = "待创建后填入"

[[r2_buckets]]
binding = "R2"
bucket_name = "cloud-mail-attachments"

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
